openapi: 3.0.3
info:
  title: ReconMarket API
  description: |
    Backend API for **ReconMarket** — a verified marketplace for construction materials in Rwanda.

    ## How to authenticate
    1. Call `POST /api/auth/login` or `POST /api/auth/register`
    2. Copy the `accessToken` from the response
    3. Click **Authorize** and enter: `Bearer <accessToken>`

    ## Roles
    | Role | Permissions |
    |------|-------------|
    | **USER** | Can browse and buy. Must be verified to sell. |
    | **ADMIN** | Manages categories, seller verification, and user roles. |

    ## Seller verification
    | Type | Meaning |
    |------|---------|
    | **NONE** | Default — cannot create listings |
    | **INDIVIDUAL_SELLER** | Approved with national ID — can sell |
    | **BUSINESS_SELLER** | Approved with RDB certificate — can sell |

    ## Listing lifecycle
    `DRAFT` → publish → `ACTIVE` → `SOLD` / `REMOVED`
  version: 1.0.0
  contact:
    name: ReconMarket

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Check that the API and database are running.
  - name: Auth
    description: Register, login, tokens, email verification, and password reset.
  - name: Verification
    description: Apply to become a verified seller (individual or business).
  - name: Categories
    description: Browse construction material categories (Steel, Cement, Wood, etc.).
  - name: Listings
    description: Browse, create, and manage construction material listings.
  - name: Uploads
    description: Upload listing images to Cloudinary.
  - name: Transactions
    description: Buy Now flow, escrow states, and pickup coordination.
  - name: Payments
    description: Mock mobile money payment intents, webhooks, and escrow.
  - name: Admin
    description: Admin-only — manage categories, verifications, and user roles.

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Returns the API status and whether PostgreSQL is reachable.
        Use this to confirm the server is up before calling other endpoints.

        - `status: ok` — API and database are healthy
        - `status: degraded` — API is up but database connection failed
      operationId: getHealth
      responses:
        '200':
          description: Health status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                service: reconmarket-backend
                database: ok
                timestamp: '2026-06-13T15:00:00.000Z'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a new **USER** account with `verificationType: NONE`.

        - Hashes and stores the password securely (bcrypt)
        - Sends a 6-digit OTP to the email for verification
        - Returns `accessToken` and `refreshToken` immediately (email still needs verifying)

        **Who can use:** Anyone (public)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created — verify email with the OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates with email and password. Returns JWT tokens on success.

        - `accessToken` — short-lived (15 min), send as `Authorization: Bearer <token>`
        - `refreshToken` — long-lived (7 days), use to get new tokens via `/api/auth/refresh`

        **Who can use:** Anyone with an account (public)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: |
        Revokes the provided refresh token so it can no longer be used to obtain new access tokens.

        The access token remains valid until it expires (~15 min). For full logout, discard both tokens on the client.

        **Who can use:** Anyone with a valid refresh token (public)
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Logged out successfully
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token **and** a new refresh token (token rotation).

        The old refresh token is revoked after use. Call this when the access token expires.

        **Who can use:** Anyone with a valid, non-revoked refresh token (public)
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token invalid, expired, or revoked
          $ref: '#/components/responses/Unauthorized'

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      description: |
        Confirms the user's email using the 6-digit OTP sent during registration or resend.

        Sets `isEmailVerified: true` on the account. Required before applying for seller verification.

        **Who can use:** Anyone (public — needs email + OTP code)
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PublicUser'
                  message:
                    type: string
                    example: Email verified successfully
        '400':
          description: Invalid or expired OTP code
          $ref: '#/components/responses/ValidationError'

  /api/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification OTP
      description: |
        Sends a new 6-digit OTP to the email if an unverified account exists.

        Always returns the same success message whether or not the email exists (prevents account enumeration).

        **Who can use:** Anyone (public)
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: OTP sent if account exists and is unverified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: If the account exists, a verification email has been sent.
        '400':
          description: Email is already verified
          $ref: '#/components/responses/ValidationError'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      description: |
        Sends a 6-digit password reset OTP to the email if an active account exists.

        Always returns the same message regardless of whether the email exists (security best practice).

        **Who can use:** Anyone (public)
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Reset code sent if account exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: If the account exists, a password reset code has been sent.

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      description: |
        Sets a new password using the OTP from `/api/auth/forgot-password`.

        Also revokes **all** active refresh tokens, forcing re-login on all devices.

        **Who can use:** Anyone with a valid reset OTP (public)
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated — log in again with new password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Password reset successfully. Please log in again.
        '400':
          description: Invalid or expired OTP
          $ref: '#/components/responses/ValidationError'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: |
        Returns the authenticated user's profile including role, verification type, and `canSell` flag.

        Use this to check login state and whether the user is allowed to create listings.

        **Who can use:** Authenticated users only
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PublicUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/verification/apply:
    post:
      tags: [Verification]
      summary: Apply for seller verification
      description: |
        Submits a request to become a verified seller. An admin must approve before the user can create listings.

        **Requirements:**
        - Email must be verified (`isEmailVerified: true`)
        - User must not already be verified
        - No other pending request may exist

        **Document types:**
        - `INDIVIDUAL_SELLER` — upload national ID (`documentUrl`)
        - `BUSINESS_SELLER` — upload RDB certificate (`documentUrl`) + `businessName`

        **Who can use:** Authenticated users with verified email
      operationId: applyVerification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyVerificationRequest'
            examples:
              individual:
                summary: Individual seller (national ID)
                value:
                  requestedType: INDIVIDUAL_SELLER
                  documentUrl: https://storage.example.com/id/passport.pdf
              business:
                summary: Business seller (RDB certificate)
                value:
                  requestedType: BUSINESS_SELLER
                  documentUrl: https://storage.example.com/rdb/certificate.pdf
                  businessName: Acme Trading Ltd
      responses:
        '201':
          description: Verification request submitted — awaiting admin review
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  verification:
                    $ref: '#/components/schemas/SellerVerification'
        '403':
          description: Email not verified
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Already verified or pending request exists
          $ref: '#/components/responses/Conflict'

  /api/verification/status:
    get:
      tags: [Verification]
      summary: Get my verification status
      description: |
        Returns the user's current `verificationType`, whether they can sell, and their recent verification requests (including pending/rejected).

        Use this on the seller dashboard to show verification progress.

        **Who can use:** Authenticated users only
      operationId: getVerificationStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification status and request history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/categories/tree:
    get:
      tags: [Categories]
      summary: Get full category tree
      description: |
        Returns all parent categories with subcategories nested in `children`.

        Use for navigation menus and filter sidebars.

        **Who can use:** Anyone (public)
      operationId: getCategoryTree
      responses:
        '200':
          description: Full category tree with nested subcategories

  /api/categories:
    get:
      tags: [Categories]
      summary: List categories
      description: |
        Returns paginated categories. Defaults to **parent categories only**.

        Subcategories are nested in `children` unless `includeSubcategories=false`.

        Use `parentId=<uuid>` to list subcategories of one parent.

        **Who can use:** Anyone (public)
      operationId: listCategories
      parameters:
        - name: page
          in: query
          description: Page number (starts at 1)
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          description: Items per page (max 100)
          schema: { type: integer, default: 20 }
        - name: parentId
          in: query
          description: Parent UUID — omit for top-level categories
          schema: { type: string, format: uuid }
        - name: includeSubcategories
          in: query
          description: Nest subcategories in response when listing parents (default true)
          schema: { type: string, enum: [true, false], default: true }
      responses:
        '200':
          description: Paginated categories with optional nested subcategories

  /api/categories/{slug}:
    get:
      tags: [Categories]
      summary: Get category by slug
      description: |
        Returns a category by slug, including its **subcategories** in `children` and parent info if it is a subcategory.

        Examples: `steel-metal` (parent), `steel-rods` (subcategory under Steel & Metal).

        **Who can use:** Anyone (public)
      operationId: getCategoryBySlug
      parameters:
        - name: slug
          in: path
          required: true
          description: Category slug (e.g. `steel-metal`, `cement-concrete`)
          schema: { type: string }
          example: steel-metal
      responses:
        '200':
          description: Category details with children
        '404':
          description: Category not found or inactive
          $ref: '#/components/responses/NotFound'

  /api/uploads/listing-images:
    post:
      tags: [Uploads]
      summary: Upload listing images (standalone)
      description: |
        Uploads image files to **Cloudinary** and returns secure public URLs.

        Use the returned URLs in `POST /api/listings` or `PATCH /api/listings/{id}`, or upload directly to a listing via `POST /api/listings/{id}/images`.

        **Validation:**
        - Field name: `images` (multipart array)
        - Allowed types: JPEG, PNG, WebP, GIF
        - Max **5MB** per file, max **10** files per request

        Requires Cloudinary credentials in server `.env`.

        **Who can use:** Verified sellers only
      operationId: uploadListingImages
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Images uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      $ref: '#/components/schemas/UploadedImage'
                  message:
                    type: string
        '400':
          description: Invalid file type, size, or missing files
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/listings:
    get:
      tags: [Listings]
      summary: Browse marketplace listings
      description: |
        Returns paginated **ACTIVE** listings for the public marketplace feed.

        Supports search, category filter, price range, location, condition, and sorting — matching the frontend marketplace filters.

        Each listing includes seller summary, category, and images.

        **Who can use:** Anyone (public)
      operationId: listListings
      parameters:
        - name: page
          in: query
          description: Page number
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          description: Items per page
          schema: { type: integer, default: 20 }
        - name: categoryId
          in: query
          description: Filter by category UUID
          schema: { type: string, format: uuid }
        - name: categorySlug
          in: query
          description: Filter by category slug (e.g. `steel-metal`)
          schema: { type: string }
        - name: search
          in: query
          description: Search in title and description
          schema: { type: string }
        - name: minPrice
          in: query
          description: Minimum price in listing currency (RWF)
          schema: { type: number }
        - name: maxPrice
          in: query
          description: Maximum price in listing currency (RWF)
          schema: { type: number }
        - name: city
          in: query
          description: Filter by city (e.g. Kigali)
          schema: { type: string }
        - name: condition
          in: query
          description: Material condition
          schema:
            type: string
            enum: [NEW, LIKE_NEW, GOOD, FAIR, POOR]
        - name: sort
          in: query
          description: Sort order for results
          schema:
            type: string
            enum: [newest, oldest, price_asc, price_desc]
            default: newest
      responses:
        '200':
          description: Paginated listings with seller and category info
    post:
      tags: [Listings]
      summary: Create a new listing
      description: |
        Creates a new listing in **DRAFT** status. Must be published separately via `PATCH /api/listings/{id}/publish`.

        **Requirements:**
        - User must be a verified seller (`INDIVIDUAL_SELLER` or `BUSINESS_SELLER`)
        - At least one image is required — upload files via `POST /api/uploads/listing-images` first, then pass the returned URLs in `images`
        - Category must exist and be active

        Default currency is **RWF** (Rwandan Franc).

        **Who can use:** Verified sellers only
      operationId: createListing
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
      responses:
        '201':
          description: Listing created as DRAFT
        '403':
          description: Seller verification required
          $ref: '#/components/responses/Forbidden'

  /api/listings/seller/me:
    get:
      tags: [Listings]
      summary: Get my listings
      description: |
        Returns all listings owned by the authenticated seller, including drafts and removed items.

        Optionally filter by `status` (e.g. `DRAFT`, `ACTIVE`). Use on the seller dashboard.

        **Who can use:** Authenticated users
      operationId: getMyListings
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          description: Filter by listing status
          schema:
            type: string
            enum: [DRAFT, ACTIVE, SOLD, RESERVED, EXPIRED, REMOVED]
      responses:
        '200':
          description: Seller's own listings (all statuses)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/listings/seller/{sellerId}:
    get:
      tags: [Listings]
      summary: Get seller public profile
      description: |
        Returns a seller's public profile: name, verification type, active listing count, and average review rating.

        Use on product detail pages to show seller trust info.

        **Who can use:** Anyone (public)
      operationId: getSellerProfile
      parameters:
        - name: sellerId
          in: path
          required: true
          description: Seller user UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Seller public profile
        '404':
          description: Seller not found
          $ref: '#/components/responses/NotFound'

  /api/listings/{id}:
    get:
      tags: [Listings]
      summary: Get listing details
      description: |
        Returns full listing details including all images, seller info, and category.

        Increments the view counter for ACTIVE listings. Owners and admins can also view DRAFT listings.

        **Who can use:** Anyone (public for ACTIVE listings)
      operationId: getListingById
      parameters:
        - name: id
          in: path
          required: true
          description: Listing UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Full listing details
        '404':
          description: Listing not found or not visible
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Listings]
      summary: Update a listing
      description: |
        Updates listing fields. Only the **owner** or an **admin** can update.

        Sellers can only set status to `DRAFT` or `REMOVED` directly — use the publish endpoint to go live.

        Replacing `images` deletes all existing images and creates new ones.

        **Who can use:** Listing owner or admin (verified seller)
      operationId: updateListing
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Listing UUID
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListingRequest'
      responses:
        '200':
          description: Listing updated
        '403':
          description: Not the listing owner
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Listings]
      summary: Remove a listing
      description: |
        Soft-deletes the listing (sets `deletedAt` and status `REMOVED`). It will no longer appear in the marketplace.

        Only the **owner** or an **admin** can remove a listing.

        **Who can use:** Listing owner or admin (verified seller)
      operationId: deleteListing
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Listing UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Listing removed from marketplace
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/listings/{id}/images:
    post:
      tags: [Listings, Uploads]
      summary: Upload images to a listing
      description: |
        Uploads one or more image files and creates **ListingImage** records linked to the listing.

        **Validation:**
        - Field name: `images` (multipart array)
        - Allowed types: JPEG, PNG, WebP, GIF
        - Max **5MB** per file, max **10** images per listing (configurable via env)

        The first image becomes primary if the listing has no primary image yet.

        **Who can use:** Listing owner or admin (verified seller)
      operationId: uploadListingImagesToListing
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Listing UUID
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Up to 10 image files
      responses:
        '201':
          description: Images uploaded and linked to listing
        '400':
          description: Invalid file type, size, or count exceeded
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/listings/{id}/publish:
    patch:
      tags: [Listings]
      summary: Publish a listing
      description: |
        Moves a listing from **DRAFT** (or **REMOVED**) to **ACTIVE**, making it visible on the marketplace.

        **Requirements:**
        - Listing must have at least one image
        - Only the owner or admin can publish

        Sets `publishedAt` to the current timestamp.

        **Who can use:** Listing owner or admin (verified seller)
      operationId: publishListing
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Listing UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Listing is now live on the marketplace
        '400':
          description: Missing images or invalid status for publishing
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/transactions:
    post:
      tags: [Transactions]
      summary: Buy Now — create transaction
      description: |
        Creates a transaction from an **ACTIVE** listing and reserves stock.

        - Deducts `quantity` from listing stock
        - Sets listing to **RESERVED** when stock reaches zero
        - Calculates `amount` (unit price × quantity) and `platformFee`
        - Transaction starts in **PENDING** until payment is confirmed

        **Who can use:** Authenticated buyers (not the listing owner)
      operationId: createTransaction
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created
        '400':
          description: Invalid quantity or listing unavailable
        '403':
          description: Cannot buy own listing
        '409':
          description: Listing already reserved by another buyer

  /api/transactions/me:
    get:
      tags: [Transactions]
      summary: List my transactions
      description: |
        Returns paginated transactions where the authenticated user is buyer, seller, or both.

        **Who can use:** Authenticated users
      operationId: listMyTransactions
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAYMENT_CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, DISPUTED, REFUNDED]
        - name: role
          in: query
          schema:
            type: string
            enum: [buyer, seller, all]
            default: all
      responses:
        '200':
          description: Paginated transactions

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction details
      description: Returns full transaction details for buyer, seller, or admin.
      operationId: getTransactionById
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Transaction details
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/transactions/{id}/payments/intent:
    post:
      tags: [Transactions, Payments]
      summary: Create payment intent (MTN MoMo / Airtel Money)
      description: |
        Creates a payment intent for a **PENDING** transaction.

        Returns `externalReference` for checkout. Payment confirmation happens via webhook (`PAYMENT_CONFIRMED` + escrow **HELD**).

        **Who can use:** Buyer only
      operationId: createPaymentIntent
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: Payment intent created

  /api/transactions/{id}/payment:
    get:
      tags: [Transactions, Payments]
      summary: Get payment status
      description: Returns payment and escrow status for a transaction.
      operationId: getTransactionPayment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Payment details including escrowStatus (NONE, HELD, RELEASED, REFUNDED)

  /api/transactions/{id}/confirm-pickup:
    post:
      tags: [Transactions]
      summary: Confirm pickup (buyer)
      description: |
        Buyer confirms item collection with a pickup photo.

        Moves **PAYMENT_CONFIRMED → IN_PROGRESS** and generates a **release OTP** for the buyer to share with the seller.

        Escrow remains **HELD** until seller verifies OTP.

        **Who can use:** Buyer only
      operationId: confirmPickup
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPickupRequest'
      responses:
        '200':
          description: Pickup confirmed, release OTP generated

  /api/transactions/{id}/verify-release-otp:
    post:
      tags: [Transactions]
      summary: Verify release OTP (seller)
      description: |
        Seller enters the OTP from the buyer after successful handover.

        Releases escrow to seller and moves transaction **IN_PROGRESS → COMPLETED**.

        **Who can use:** Seller only
      operationId: verifyReleaseOtp
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyReleaseOtpRequest'
      responses:
        '200':
          description: Escrow released, transaction completed

  /api/payments/mock/simulate:
    post:
      tags: [Payments]
      summary: Simulate mock payment (dev only)
      description: |
        Triggers the same logic as a `payment.succeeded` webhook for hackathon testing.

        Disabled in production.

        **Who can use:** Dev/testing (no auth required in local mock flow)
      operationId: simulateMockPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalReference]
              properties:
                externalReference:
                  type: string
      responses:
        '200':
          description: Mock payment processed

  /api/webhooks/payments/mock:
    post:
      tags: [Payments]
      summary: Mock payment webhook
      description: |
        Receives mock MTN MoMo / Airtel Money webhook events.

        **Events:** `payment.succeeded`, `payment.failed`, `refund.succeeded`

        Requires header `x-webhook-signature` (HMAC-SHA256 of raw body using `MOCK_PAYMENT_WEBHOOK_SECRET`).

        On `payment.succeeded`: transaction → **PAYMENT_CONFIRMED**, escrow → **HELD**.
      operationId: mockPaymentWebhook
      parameters:
        - name: x-webhook-signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockPaymentWebhookPayload'
      responses:
        '200':
          description: Webhook processed

  /api/transactions/{id}/cancel:
    patch:
      tags: [Transactions]
      summary: Cancel transaction
      description: |
        Cancels a transaction and restores listing stock.

        If escrow is **HELD**, initiates refund → transaction **REFUNDED**.

        Allowed from **PENDING**, **PAYMENT_CONFIRMED**, or **IN_PROGRESS**.

        **Who can use:** Buyer or seller
      operationId: cancelTransaction
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelTransactionRequest'
      responses:
        '200':
          description: Transaction cancelled

  /api/transactions/{id}/dispute:
    patch:
      tags: [Transactions]
      summary: Open dispute
      description: |
        Moves transaction to **DISPUTED** from **PAYMENT_CONFIRMED** or **IN_PROGRESS**.

        **Who can use:** Buyer or seller
      operationId: disputeTransaction
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeTransactionRequest'
      responses:
        '200':
          description: Transaction disputed

  /api/transactions/{id}/refund:
    patch:
      tags: [Transactions, Payments]
      summary: Refund disputed transaction
      description: |
        Refunds escrow to buyer for **DISPUTED** transactions.

        Moves payment escrow **HELD → REFUNDED** and transaction → **REFUNDED**. Restores listing stock.

        **Who can use:** Buyer or seller (dispute resolution)
      operationId: refundTransaction
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Escrow refunded to buyer

  /api/admin/verifications/pending:
    get:
      tags: [Admin]
      summary: List pending seller verifications
      description: |
        Returns all seller verification requests awaiting admin review, oldest first.

        Each entry includes the applicant's user profile and submitted documents.

        **Who can use:** Admin only
      operationId: listPendingVerifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending verification requests with applicant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  verifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/SellerVerificationWithUser'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/verifications/{id}:
    patch:
      tags: [Admin]
      summary: Review a seller verification
      description: |
        Approves, rejects, or requests resubmission of a seller verification request.

        **On APPROVED:** Sets the user's `verificationType` to `INDIVIDUAL_SELLER` or `BUSINESS_SELLER` — they can now create listings.

        **On REJECTED / RESUBMIT_REQUIRED:** Sends a notification to the user with the rejection reason.

        **Who can use:** Admin only
      operationId: reviewVerification
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VerificationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewVerificationRequest'
            examples:
              approve:
                summary: Approve seller
                value:
                  status: APPROVED
              reject:
                summary: Reject with reason
                value:
                  status: REJECTED
                  rejectionReason: Document is expired or unreadable
      responses:
        '200':
          description: Verification reviewed — user notified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verification:
                    $ref: '#/components/schemas/SellerVerification'
                  user:
                    $ref: '#/components/schemas/PublicUser'
        '400':
          description: Missing rejection reason or already reviewed
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Change a user's role
      description: |
        Promotes a user to **ADMIN** or demotes back to **USER**.

        An admin cannot demote themselves. Use with care — admins have full platform access.

        **Who can use:** Admin only
      operationId: updateUserRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: User role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PublicUser'
        '400':
          description: Cannot demote yourself
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/categories:
    post:
      tags: [Admin, Categories]
      summary: Create a category
      description: |
        Creates a **parent category** or **subcategory**.

        - Omit `parentId` to create a top-level category
        - Set `parentId` to a parent category UUID to create a subcategory (max 2 levels)

        Slug is auto-generated from the name if not provided.

        **Who can use:** Admin only
      operationId: createCategory
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Slug already exists
          $ref: '#/components/responses/Conflict'

  /api/admin/categories/{id}:
    patch:
      tags: [Admin, Categories]
      summary: Update a category
      description: |
        Updates category name, slug, description, image, sort order, or active status.

        Deactivate a category with `isActive: false` instead of deleting when it has listings.

        **Who can use:** Admin only
      operationId: updateCategory
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '200':
          description: Category updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin, Categories]
      summary: Deactivate a category
      description: |
        Soft-deactivates a category (`isActive: false`). It will no longer appear in public listings.

        Fails if the category still has listings or subcategories — reassign or deactivate those first.

        **Who can use:** Admin only
      operationId: deleteCategory
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          description: Category UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Category deactivated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Category has listings or subcategories

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token from `POST /api/auth/login` or `POST /api/auth/register`.
        Enter as: `Bearer <accessToken>`

  parameters:
    VerificationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Seller verification request UUID
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Target user UUID

  responses:
    ValidationError:
      description: Request body or query failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Validation failed
            details:
              email: [Invalid email]
    Unauthorized:
      description: Missing, invalid, or expired access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Authentication required
    Forbidden:
      description: Authenticated but lacking required role or verification
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Insufficient permissions
    NotFound:
      description: The requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not found
    Conflict:
      description: Resource already exists or operation conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Email already registered

  schemas:
    UserRole:
      type: string
      enum: [USER, ADMIN]
      description: USER = buyer/seller, ADMIN = platform manager

    VerificationType:
      type: string
      enum: [NONE, INDIVIDUAL_SELLER, BUSINESS_SELLER]
      description: Seller verification level — NONE means cannot sell

    VerificationStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, RESUBMIT_REQUIRED]

    PublicUser:
      type: object
      description: Safe user profile (no password or sensitive data)
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        verificationType:
          $ref: '#/components/schemas/VerificationType'
        isEmailVerified:
          type: boolean
        isPhoneVerified:
          type: boolean
        isActive:
          type: boolean
        canSell:
          type: boolean
          description: True when verificationType is INDIVIDUAL_SELLER or BUSINESS_SELLER
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          description: Minimum 8 characters
          example: securePass123
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyEmailRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP from email (dev logs show code in terminal)
          example: '708409'

    ResetPasswordRequest:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP from forgot-password email
        newPassword:
          type: string
          minLength: 8

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Long-lived token from login/register response

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/UserRole'

    ApplyVerificationRequest:
      type: object
      required: [requestedType, documentUrl]
      properties:
        requestedType:
          type: string
          enum: [INDIVIDUAL_SELLER, BUSINESS_SELLER]
          description: Type of seller verification being requested
        documentUrl:
          type: string
          format: uri
          description: URL to uploaded ID document or RDB certificate
        businessName:
          type: string
          minLength: 2
          maxLength: 200
          description: Required when requestedType is BUSINESS_SELLER

    ReviewVerificationRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [APPROVED, REJECTED, RESUBMIT_REQUIRED]
          description: APPROVED grants seller status; others require rejectionReason
        rejectionReason:
          type: string
          minLength: 3
          maxLength: 500
          description: Required when status is REJECTED or RESUBMIT_REQUIRED

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        accessToken:
          type: string
          description: Short-lived JWT (~15 min) — use in Authorization header
        refreshToken:
          type: string
          description: Long-lived token (~7 days) — use to refresh access token
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: ok = all systems healthy; degraded = database unreachable
        service:
          type: string
        database:
          type: string
          enum: [ok, error]
        timestamp:
          type: string
          format: date-time

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        message:
          type: string
          description: Included in development for 500 errors

    SellerVerification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        requestedType:
          $ref: '#/components/schemas/VerificationType'
        documentUrl:
          type: string
          format: uri
        businessName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/VerificationStatus'
        rejectionReason:
          type: string
          nullable: true
        reviewedById:
          type: string
          format: uuid
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        submittedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SellerVerificationWithUser:
      allOf:
        - $ref: '#/components/schemas/SellerVerification'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/PublicUser'

    VerificationStatusResponse:
      type: object
      properties:
        verificationType:
          $ref: '#/components/schemas/VerificationType'
        canSell:
          type: boolean
        requests:
          type: array
          description: Recent verification requests (newest first)
          items:
            $ref: '#/components/schemas/SellerVerification'

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Display name (e.g. "Steel & Metal")
          example: Steel & Metal
        slug:
          type: string
          description: URL-friendly identifier — auto-generated from name if omitted
          example: steel-metal
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        parentId:
          type: string
          format: uuid
          description: Parent category UUID — set to create a subcategory
        sortOrder:
          type: integer
          description: Display order (lower = first)

    UploadedImage:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Public URL to access the uploaded file
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
          description: File size in bytes

    CreateTransactionRequest:
      type: object
      required: [listingId, pickupLocation, agreedPickupAt]
      properties:
        listingId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1
        pickupLocation:
          type: string
          minLength: 3
          example: Kigali, Nyarugenge District, KN 3 Rd
        agreedPickupAt:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000

    ConfirmPaymentRequest:
      deprecated: true
      description: Replaced by payment intent + webhook flow
      type: object

    CreatePaymentIntentRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [MTN_MOMO, AIRTEL_MONEY]
        payerPhone:
          type: string
          example: '0781234567'

    ConfirmPickupRequest:
      type: object
      required: [pickupPhotoUrl]
      properties:
        pickupPhotoUrl:
          type: string
          format: uri

    VerifyReleaseOtpRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6

    MockPaymentWebhookPayload:
      type: object
      required: [event, externalReference]
      properties:
        event:
          type: string
          enum: [payment.succeeded, payment.failed, refund.succeeded]
        externalReference:
          type: string
        providerReference:
          type: string
        amount:
          type: number
        currency:
          type: string
        paidAt:
          type: string
          format: date-time
        failureReason:
          type: string
        refundReference:
          type: string

    CancelTransactionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    DisputeTransactionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 1000

    CreateListingRequest:
      type: object
      required: [categoryId, title, description, price, condition, images]
      properties:
        categoryId:
          type: string
          format: uuid
          description: Must be an active category
        title:
          type: string
          example: Steel Rods (8mm)
        description:
          type: string
          example: High quality steel rods ready for verified pickup in Kigali.
        price:
          type: number
          example: 15000
        currency:
          type: string
          default: RWF
          example: RWF
        condition:
          type: string
          enum: [NEW, LIKE_NEW, GOOD, FAIR, POOR]
        city:
          type: string
          example: Kigali
        country:
          type: string
          default: Rwanda
        quantity:
          type: integer
          minimum: 1
          default: 1
          description: Available units for sale
        images:
          type: array
          minItems: 1
          maxItems: 10
          description: At least one image required. Upload via POST /api/uploads/listing-images and use returned URLs.
          items:
            type: object
            required: [url]
            properties:
              url:
                type: string
                format: uri
              altText:
                type: string
              sortOrder:
                type: integer
              isPrimary:
                type: boolean

    UpdateListingRequest:
      type: object
      description: All fields optional — only send what you want to change
      properties:
        categoryId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
        condition:
          type: string
          enum: [NEW, LIKE_NEW, GOOD, FAIR, POOR]
        city:
          type: string
        country:
          type: string
        status:
          type: string
          enum: [DRAFT, REMOVED]
          description: Sellers can only set DRAFT or REMOVED — use publish endpoint for ACTIVE
        images:
          type: array
